# AIP-PIR — HTTP → HTTPS redirect
server {
    listen 80;
    server_name aip-pir.depedguihulngan.ph;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://aip-pir.depedguihulngan.ph$request_uri; }
}

# AIP-PIR — HTTPS
server {
    listen 443 ssl;
    server_name aip-pir.depedguihulngan.ph;

    ssl_certificate     /etc/letsencrypt/live/aip-pir.depedguihulngan.ph/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aip-pir.depedguihulngan.ph/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    add_header Strict-Transport-Security "max-age=31536000" always;
    client_max_body_size 20M;

    resolver 127.0.0.11 valid=10s ipv6=off;

    # Backend API and uploaded assets
    set $backend http://qpir-aip-backend-1:3001;
    location /api/ {
        proxy_pass          $backend;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade $http_upgrade;
        proxy_set_header    Connection 'upgrade';
        proxy_set_header    Host $host;
        proxy_set_header    X-Real-IP $remote_addr;
        proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto https;
        proxy_cache_bypass  $http_upgrade;
    }
    location /school-logos/ { proxy_pass $backend; }
    location /cluster-logos/ { proxy_pass $backend; }
    location /app-logo/ { proxy_pass $backend; }

    # Frontend (React app via internal Nginx)
    set $frontend http://qpir-aip-frontend-1:80;
    location / {
        proxy_pass          $frontend;
        proxy_http_version  1.1;
        proxy_set_header    Host $host;
        proxy_set_header    X-Real-IP $remote_addr;
        proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto https;
    }
}
