# =============================================================================
# AIP-PIR — Docker Compose
#
# Quick start:
#   1. cp .env.docker.example .env
#   2. Edit .env — set passwords/secrets and VITE_API_URL
#   3. docker compose up -d --build
#
# Services:
#   frontend  →  http://<host>:${FRONTEND_PORT:-80}
#   backend   →  http://<host>:3001
#   caddy     →  optional profile: docker compose --profile ssl up -d
#   backup    →  optional profile: docker compose --profile backup up -d
# =============================================================================

name: qpir-aip

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    build:
      context: ./server
      dockerfile: Dockerfile.db
    image: qpir-aip-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-pir_system}
      BACKUP_DB_USER: ${BACKUP_DB_USER:-backup_reader}
      BACKUP_DB_PASSWORD: ${BACKUP_DB_PASSWORD:?Set BACKUP_DB_PASSWORD in .env}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-pir_system}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "${POSTGRES_BIND_ADDRESS:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432"

  # ── Backend (Deno + Prisma) ─────────────────────────────────────────────────
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-pir_system}?schema=public
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      EMAIL_CONFIG_SECRET: ${EMAIL_CONFIG_SECRET:?Set EMAIL_CONFIG_SECRET in .env}
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN:-http://localhost}
      NODE_ENV: production
      PORT: 3001
      RECAPTCHA_SECRET_KEY: ${RECAPTCHA_SECRET_KEY:-}
      OAUTH_REDIRECT_BASE_URL: ${OAUTH_REDIRECT_BASE_URL:-http://localhost:3001}
      OAUTH_STATE_SECRET: ${OAUTH_STATE_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      TRUST_PROXY: ${TRUST_PROXY:-false}
      TRUSTED_PROXY_CIDRS: ${TRUSTED_PROXY_CIDRS:-}
      RECAPTCHA_BYPASS_PRIVATE_IPS: ${RECAPTCHA_BYPASS_PRIVATE_IPS:-false}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@qpir.local}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-}
      SEED_ADMIN_MUST_CHANGE_PASSWORD: ${SEED_ADMIN_MUST_CHANGE_PASSWORD:-true}
      BACKUP_TRIGGER_DIR: /app/backups/triggers
    volumes:
      - ./backups:/app/backups
      - ./data:/data:ro
      - uploaded_assets:/app/public
    ports:
      - "${BACKEND_BIND_ADDRESS:-127.0.0.1}:${BACKEND_PORT:-3001}:3001"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3001/api/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ── Frontend (React → Nginx) ────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: react-app/Dockerfile
      args:
        # Must be the URL that browsers (not Docker) use to reach the backend.
        # Example: http://192.168.1.100:3001 or https://api.yourdomain.com
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
        VITE_RECAPTCHA_SITE_KEY: ${VITE_RECAPTCHA_SITE_KEY:-}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-80}:80"

  # ── HTTPS Reverse Proxy (Caddy) ─────────────────────────────────────────────
  caddy:
    profiles:
      - ssl
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-aip-pir.depedguihulngan.ph}
    ports:
      - "${HTTP_BIND_ADDRESS:-0.0.0.0}:80:80"
      - "${HTTPS_BIND_ADDRESS:-0.0.0.0}:443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  # ── Backup Service ──────────────────────────────────────────────────────────
  backup:
    profiles:
      - backup
    build:
      context: ./server
      dockerfile: Dockerfile.backup
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backups:/app/backups
      - ${RCLONE_CONFIG_DIR:-./.docker/rclone}:/root/.config/rclone:ro
    environment:
      POSTGRES_HOST: db
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-pir_system}
      BACKUP_DB_USER: ${BACKUP_DB_USER:-backup_reader}
      BACKUP_DB_PASSWORD: ${BACKUP_DB_PASSWORD:?Set BACKUP_DB_PASSWORD in .env}
      BACKUP_ENCRYPTION_KEY: ${BACKUP_ENCRYPTION_KEY:?Set BACKUP_ENCRYPTION_KEY in .env}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-5}
      BACKUP_CLOUD_ENABLED: ${BACKUP_CLOUD_ENABLED:-false}
      BACKUP_RCLONE_REMOTE: ${BACKUP_RCLONE_REMOTE:-my_remote}
      BACKUP_RCLONE_PATH: ${BACKUP_RCLONE_PATH:-/AIP-PIR-Backups}
      COMPOSE_PROJECT_NAME: ${COMPOSE_PROJECT_NAME:-qpir-aip}

volumes:
  db_data:
  uploaded_assets:
  caddy_data:
  caddy_config:
